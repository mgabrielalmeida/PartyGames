<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack (21) | Party Games</title>

    <link rel="stylesheet" href="../../../assets/css/global.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========== TELA 1: SETUP ========== -->
    <section id="tela-setup" class="tela ativa">
        <div class="setup-container">
            <h1 class="titulo-jogo">🃏 Blackjack</h1>
            <p class="subtitulo">Quantos jogadores?</p>

            <div class="setup-input-group">
                <button id="btn-minus" class="btn-stepper">−</button>
                <span id="num-jogadores" class="num-display">1</span>
                <button id="btn-plus" class="btn-stepper">+</button>
            </div>

            <div class="fichas-setup">
                <label class="fichas-label" for="fichas-iniciais">Fichas iniciais por jogador</label>
                <div class="setup-input-group">
                    <button id="btn-fichas-minus" class="btn-stepper btn-stepper-sm">−</button>
                    <span id="num-fichas" class="num-display num-display-sm">500</span>
                    <button id="btn-fichas-plus" class="btn-stepper btn-stepper-sm">+</button>
                </div>
            </div>

            <button id="btn-iniciar" class="btn-primario">Iniciar Jogo</button>

            <a href="../../../single-device.html" class="back-btn link-voltar">← Voltar ao Menu</a>
        </div>
    </section>

    <!-- ========== TELA 2: APOSTAS ========== -->
    <section id="tela-apostas" class="tela">
        <div class="apostas-container">
            <h2 class="apostas-titulo">💰 Rodada de Apostas</h2>
            <div id="apostas-jogadores" class="apostas-jogadores">
                <!-- Generated by JS -->
            </div>
            <button id="btn-confirmar-apostas" class="btn-primario">Confirmar Apostas</button>
        </div>
    </section>

    <!-- ========== TELA 3: JOGO ========== -->
    <section id="tela-jogo" class="tela">

        <!-- Botão Voltar -->
        <div class="jogo-topo">
            <a href="../../../single-device.html" class="back-btn link-voltar">← Voltar</a>
        </div>

        <!-- Área do Dealer -->
        <div class="dealer-area">
            <h2 class="dealer-titulo">Dealer</h2>
            <div id="dealer-cartas" class="cartas-container">
                <!-- Cards rendered by JS -->
            </div>
            <div id="dealer-pontos" class="pontos-badge">—</div>
        </div>

        <!-- Separador -->
        <div class="mesa-separador">
            <div class="separador-linha"></div>
            <span class="separador-texto" id="status-texto">Vez do jogador</span>
            <div class="separador-linha"></div>
        </div>

        <!-- Área dos Jogadores -->
        <div id="jogadores-area" class="jogadores-area">
            <!-- Player panels rendered by JS -->
        </div>

        <!-- Botões de Ação -->
        <div id="acoes-container" class="acoes-container">
            <button id="btn-hit" class="btn-acao btn-hit">🃏 Hit</button>
            <button id="btn-stand" class="btn-acao btn-stand">✋ Stand</button>
            <button id="btn-double" class="btn-acao btn-double">💰 Double</button>
            <button id="btn-split" class="btn-acao btn-split">✂️ Split</button>
        </div>

    </section>

    <!-- ========== MODAL: Resultado da Rodada ========== -->
    <div id="modal-resultado" class="modal-overlay">
        <div class="modal-card modal-resultado-card">
            <h3 class="modal-titulo">📊 Resultado da Rodada</h3>
            <div id="resultado-lista" class="resultado-lista">
                <!-- Results rendered by JS -->
            </div>
            <button id="btn-proxima-rodada" class="btn-primario">Próxima Rodada</button>
        </div>
    </div>

    <!-- ========== MODAL: Fim de Jogo ========== -->
    <div id="modal-fim" class="modal-overlay">
        <div class="modal-card modal-fim-card">
            <div id="fim-icone" class="fim-icone">💸</div>
            <h3 id="fim-titulo" class="modal-titulo">Fim de Jogo!</h3>
            <p id="fim-mensagem" class="fim-mensagem"></p>
            <button id="btn-novo-jogo" class="btn-primario">Novo Jogo</button>
        </div>
    </div>

    <!-- ========== Mensagem flutuante ========== -->
    <div id="mensagem-flutuante" class="mensagem-pontos"></div>

    <script src="../../../assets/js/app.js"></script>
    <script src="script.js"></script>

</body>

</html>
