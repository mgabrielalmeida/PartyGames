<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintonia | Party Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../../assets/css/global.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Animated Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <header class="barra-superior">

        <a href="../../../index.html" class="back-btn">← Voltar</a>

        <div class="placar">
            <div id="placar-j1" class="jogador ativo">
                <h2>Equipe 1</h2>
                <p id="pontos-j1">0 pts</p>
            </div>
            <div id="placar-j2" class="jogador">
                <h2>Equipe 2</h2>
                <p id="pontos-j2">0 pts</p>
            </div>
        </div>

    </header>

    <h1 class="gradient-text" style="font-size: 3rem; font-weight: 800; margin-bottom: 10px;">Sintonia</h1>

    <div class="toggle-container">
        <label class="switch">
            <input type="checkbox" id="toggle-sugestao" checked>
            <span class="slider round"></span>
        </label>
        <span>Sugestão Automática de Rodadas</span>
    </div>

    <p id="dica-rodada">Rodada atual: <span class="destaque">Quente - Frio</span></p>

    <div id="mensagem-resultado" class="mensagem-resultado"></div>

    <div class="area-jogo">
        <div class="extremo esquerdo" id="extremo-esq">Quente</div>

        <div class="roda">

            <div class="alvo"></div>

            <div class="tampa-fixa-inferior"></div>
            <div class="tampa-superior" id="tampa-revelar"></div>

            <div class="ponteiro"></div>

        </div>

        <div class="extremo direito" id="extremo-dir">Frio</div>
    </div>

    <div class="botoes">
        <button id="btn-nova-categoria" class="btn glass-btn" style="display: none;">Nova Categoria</button>
        <button id="btn-girar" class="btn glass-btn">Girar Roleta (Novo Alvo)</button>
        <button id="btn-revelar" class="btn glass-btn">Abrir/Fechar Tampa</button>
        <button id="btn-palpite" class="btn btn-primary">Palpite!</button>
    </div>

    <script src="../../../assets/js/app.js"></script>

    <script src="script.js"></script>

</body>

</html>
